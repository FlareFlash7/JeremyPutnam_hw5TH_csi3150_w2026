<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Used Car Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1>Oakland Auto Exchange</h1>
            <p>Find your next used car with flexible filters.</p>
        </div>
    </header>

    <main class="container">
        <section class="filters" aria-label="Car filters">
            <h2>Filter inventory</h2>
            <form id="filter-form">
                <div class="filter-group">
                    <label for="min-year">Year (min)</label>
                    <input type="number" id="min-year" name="minYear" placeholder="e.g. 2015" />
                </div>

                <div class="filter-group">
                    <label for="max-year">Year (max)</label>
                    <input type="number" id="max-year" name="maxYear" placeholder="e.g. 2020" />
                </div>

                <div class="filter-group">
                    <span class="filter-label">Make</span>
                    <div class="checkbox-group" id="make-options">
                        <!-- Filled dynamically -->
                    </div>
                </div>

                <div class="filter-group">
                    <label for="max-mileage">Max mileage</label>
                    <input type="number" id="max-mileage" name="maxMileage" placeholder="e.g. 30000" />
                </div>

                <div class="filter-group">
                    <label for="min-price">Min price ($)</label>
                    <input type="number" id="min-price" name="minPrice" placeholder="e.g. 10000" />
                </div>

                <div class="filter-group">
                    <label for="max-price">Max price ($)</label>
                    <input type="number" id="max-price" name="maxPrice" placeholder="e.g. 25000" />
                </div>

                <div class="filter-group">
                    <span class="filter-label">Color</span>
                    <div class="checkbox-group" id="color-options">
                        <!-- Filled dynamically -->
                    </div>
                </div>

                <div class="filter-actions">
                    <button type="submit">Apply filters</button>
                    <button type="button" id="clear-filters">Clear</button>
                </div>
            </form>
        </section>

        <section class="inventory" aria-label="Car listings">
            <h2>Available cars</h2>
            <p id="results-message" class="results-message" aria-live="polite"></p>
            <div id="car-list" class="card-grid">
                <!-- Cards injected here -->
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <small>&copy; 2026 Oakland Auto Exchange</small>
        </div>
    </footer>

   <script src="js/usedCars-TH-1.js"></script>
   <script src="js/main.js"></script>
</body>
</html>
